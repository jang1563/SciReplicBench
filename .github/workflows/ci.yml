name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -q

      - name: Validate rubric structure
        run: |
          python - <<'PY'
          import glob, json, sys

          def count_leaves(node):
              if node.get("is_leaf"):
                  return 1
              return sum(count_leaves(c) for c in node.get("children", []))

          expected = {
              "papers/inspiration4_multiome/rubric.json": 60,
              "papers/squidpy_spatial/rubric.json": 40,
              "papers/genelab_benchmark/rubric.json": 30,
          }
          failures = []
          for path, minimum in expected.items():
              with open(path) as f:
                  rubric = json.load(f)
              leaves = count_leaves(rubric.get("rubric", rubric))
              print(f"{path}: {leaves} leaves (min {minimum})")
              if leaves < minimum:
                  failures.append(f"{path} has {leaves} leaves, below minimum {minimum}")
          if failures:
              for msg in failures:
                  print(f"FAIL: {msg}", file=sys.stderr)
              sys.exit(1)
          PY
