name: Scientific Stack Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  squidpy-stack-smoke:
    name: squidpy scientific stack smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            environments/requirements.squidpy_spatial.txt
            environments/requirements.squidpy_spatial.smoke.txt

      - name: Install scientific smoke environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install -r environments/requirements.squidpy_spatial.smoke.txt

      - name: Import scanpy, squidpy, spatialdata
        run: python scripts/check_squidpy_scientific_stack.py
